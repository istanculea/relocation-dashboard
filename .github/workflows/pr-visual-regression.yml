name: PR Visual Regression

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-visual-regression-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run visual regression suite
        run: npm run dashboard:test:visual

      - name: Upload Playwright screenshot diffs and report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-artifacts
          retention-days: 14
          if-no-files-found: ignore
          path: |
            playwright-test-results
            playwright-report